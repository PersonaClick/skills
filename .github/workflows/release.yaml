name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Read release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < version.txt)"

          if [[ -z "$version" ]]; then
            echo "version.txt is empty" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^v?[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "version.txt must contain a semantic version, got: $version" >&2
            exit 1
          fi

          tag_name="v${version#v}"

          {
            echo "version=${version#v}"
            echo "tag_name=$tag_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag_name }}"
          staging="dist/personaclick-skills-${tag}"

          rm -rf dist
          mkdir -p "$staging"

          cp README.md "$staging/"

          while IFS= read -r skill_file; do
            skill_dir="$(dirname "$skill_file")"
            mkdir -p "$staging/$skill_dir"
            cp -R "$skill_dir/." "$staging/$skill_dir/"
          done < <(find . -mindepth 2 -maxdepth 2 -name SKILL.md -not -path './docs/*' | sort)

          tar -czf "dist/personaclick-skills-${tag}.tar.gz" -C dist "personaclick-skills-${tag}"
          (cd dist && zip -qr "personaclick-skills-${tag}.zip" "personaclick-skills-${tag}")

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag_name }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists. Bump version.txt before creating another release." >&2
            exit 1
          fi

          gh release create "$tag" \
            "dist/personaclick-skills-${tag}.tar.gz" \
            "dist/personaclick-skills-${tag}.zip" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Release $tag"
